function drawErrorOverlay() {
  if (!lastError) return;
  // fade out after 8 seconds
  const age = (performance.now() - lastErrorAt) / 1000;
  if (age > 8) { lastError = null; return; }
  const alpha = age > 6 ? (8 - age) / 2 : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  const boxH = 90;
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(10, H - boxH - 10, W - 20, boxH);
  ctx.fillStyle = '#ff6b6b';
  ctx.font = 'bold 14px monospace';
  ctx.textBaseline = 'top';
  ctx.fillText('Error: ' + (lastError.message || lastError).toString().slice(0, 100), 20, H - boxH);
  if (lastError.stack) {
    ctx.fillStyle = '#ffaaaa';
    ctx.font = '12px monospace';
    const lines = lastError.stack.split('\n').slice(1, 4);
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i].trim().slice(0, 110), 20, H - boxH + 22 + i * 16);
    }
  }
  ctx.restore();
}

function loop(t) {
  try {
  const dt = Math.min(50, t - lastT) / 1000;
  lastT = t;

  // --- Cat movement ---
  let speed = 0;
  if (cat.toiletState === 'going') {
    // Auto-swim to toilet seat position (so cat sits ON top of the seat)
    const t = cat.toiletTarget;
    const targetX = t.x;
    const targetY = t.y - 22 * TOILET_SCALE - 18 * cat.scale; // sit on the seat
    const dx = targetX - cat.x, dy = targetY - cat.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 6) {
      cat.toiletState = 'sitting';
      cat.toiletT = 3.0;
      cat.x = targetX;
      cat.y = targetY;
      cat.vx = 0; cat.vy = 0;
      shrinkCat(0.1);
      // First arrival toot
      spawnFart(cat.x, cat.y + 14 * cat.scale, cat.facing);
      fartSound();
    } else {
      const swimSpeed = 420;
      cat.vx = (dx / dist) * swimSpeed;
      cat.vy = (dy / dist) * swimSpeed;
      cat.x += cat.vx * dt;
      cat.y += cat.vy * dt;
      if (Math.abs(cat.vx) > 25) cat.facing = cat.vx > 0 ? 1 : -1;
    }
    speed = Math.hypot(cat.vx, cat.vy);
  } else if (cat.toiletState === 'sitting') {
    cat.toiletT -= dt;
    cat.vx = 0; cat.vy = 0;
    // Occasional toot while sitting
    if (Math.random() < dt * 1.2) {
      spawnFart(cat.x, cat.y + 10 * cat.scale, cat.facing);
      if (Math.random() < 0.3) fartSound();
    }
    if (cat.toiletT <= 0) {
      // Begin leaving - auto-swim away from toilet
      if (cat.toiletTarget) cat.toiletTarget.inUse = false;
      cat.toiletState = 'leaving';
      cat.toiletT = 0.75;
      cat.vy = -360;
      cat.vx = cat.facing * 260;
    }
    speed = 0;
  } else if (cat.toiletState === 'leaving') {
    // Brief auto-swim away, ignoring player input, to clear the tap radius
    cat.toiletT -= dt;
    cat.x += cat.vx * dt;
    cat.y += cat.vy * dt;
    // Light drag so she eases out, doesn't stop dead
    cat.vx *= Math.pow(0.35, dt);
    cat.vy *= Math.pow(0.35, dt);
    if (cat.toiletT <= 0) {
      cat.toiletState = 'free';
      cat.toiletTarget = null;
    }
    speed = Math.hypot(cat.vx, cat.vy);
    if (Math.abs(cat.vx) > 25) cat.facing = cat.vx > 0 ? 1 : -1;
  } else if (cat.subState === 'entering') {
    // Auto-swim cat toward the sub, then climb in
    const sub = cat.activeSub;
    if (!sub) {
      cat.subState = 'free';
      speed = 0;
    } else {
      const dx = sub.x - cat.x, dy = sub.y - cat.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 30) {
        cat.subState = 'in_sub';
        cat.x = sub.x; cat.y = sub.y;
        cat.vx = 0; cat.vy = 0;
      } else {
        const swimSpeed = 420;
        cat.vx = (dx / dist) * swimSpeed;
        cat.vy = (dy / dist) * swimSpeed;
        cat.x += cat.vx * dt;
        cat.y += cat.vy * dt;
        if (Math.abs(cat.vx) > 25) cat.facing = cat.vx > 0 ? 1 : -1;
      }
      speed = Math.hypot(cat.vx, cat.vy);
    }
  } else if (cat.subState === 'in_sub') {
    const sub = cat.activeSub;
    const wasUnderwaterSub = sub.y >= SURFACE_Y;
    if (sub.y >= SURFACE_Y) {
      // UNDERWATER sub physics - fast and momentumy
      if (touchActive) {
        const wx = touchSX + camera.x;
        const wy = touchSY + camera.y;
        const dx = wx - sub.x, dy = wy - sub.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 8) {
          const accel = 1100;
          sub.vx += (dx / dist) * accel * dt;
          sub.vy += (dy / dist) * accel * dt;
        }
      }
      const drag = Math.pow(0.18, dt);
      sub.vx *= drag;
      sub.vy *= drag;
      const subSpeed = Math.hypot(sub.vx, sub.vy);
      const subMax = 600;
      if (subSpeed > subMax) {
        sub.vx = (sub.vx / subSpeed) * subMax;
        sub.vy = (sub.vy / subSpeed) * subMax;
      }
    } else {
      // IN AIR - weaker gravity than the cat (so sub jumps higher)
      sub.vy += 500 * dt;
      sub.vx *= Math.pow(0.85, dt); // very light air drag
    }
    sub.x += sub.vx * dt;
    sub.y += sub.vy * dt;
    // Clamp - sub can rise high above water
    sub.x = Math.max(80, Math.min(WORLD_W - 80, sub.x));
    sub.y = Math.max(SURFACE_Y - 500, Math.min(SAND_TOP - 50, sub.y));
    if (Math.abs(sub.vx) > 25) sub.facing = sub.vx > 0 ? 1 : -1;
    // Camera tracks the sub via cat position
    cat.x = sub.x;
    cat.y = sub.y;
    cat.facing = sub.facing;
    speed = Math.hypot(sub.vx, sub.vy);
    sub.propellerT += dt * (5 + speed * 0.04);
    netNearby(sub);
    // Wiggle netted creatures inside the net
    for (const item of sub.netted) {
      item.netX += item.netVx * dt;
      item.netY += item.netVy * dt;
      // Bounce inside net bag
      if (item.netX < -180) { item.netX = -180; item.netVx = Math.abs(item.netVx); }
      if (item.netX > -85) { item.netX = -85; item.netVx = -Math.abs(item.netVx); }
      if (item.netY < -25) { item.netY = -25; item.netVy = Math.abs(item.netVy); }
      if (item.netY > 25) { item.netY = 25; item.netVy = -Math.abs(item.netVy); }
      item.netVx *= 0.96;
      item.netVy *= 0.96;
      item.wig += dt * 6;
    }
    // Surface crossing splash
    const isUnderwaterSubNow = sub.y >= SURFACE_Y;
    if (wasUnderwaterSub !== isUnderwaterSubNow) {
      const intensity = Math.min(2.0, Math.abs(sub.vy) / 220 + 0.5);
      spawnSplash(sub.x, SURFACE_Y, intensity);
      splashSound(intensity);
    }
    // Propeller bubbles trail (only underwater)
    if (sub.y >= SURFACE_Y && Math.random() < dt * 12) {
      helmetBubbles.push({
        x: sub.x - sub.facing * 78,
        y: sub.y + (Math.random() - 0.5) * 16,
        vy: -10 - Math.random() * 30,
        vx: -sub.facing * (40 + Math.random() * 40),
        size: 3 + Math.random() * 4,
        life: 1.0,
      });
    }
  } else {
    // FREE - normal player control. Different physics in air vs water.
    const wasUnderwater = cat.y >= SURFACE_Y;
    if (cat.y >= SURFACE_Y) {
      // UNDERWATER - swim physics
      if (touchActive) {
        const wx = touchSX + camera.x;
        const wy = touchSY + camera.y;
        const dx = wx - cat.x, dy = wy - cat.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 8) {
          const accel = 700;
          cat.vx += (dx / dist) * accel * dt;
          cat.vy += (dy / dist) * accel * dt;
        }
      }
      const drag = Math.pow(0.04, dt);
      cat.vx *= drag;
      cat.vy *= drag;
      speed = Math.hypot(cat.vx, cat.vy);
      const maxSpeed = 380;
      if (speed > maxSpeed) {
        cat.vx = (cat.vx / speed) * maxSpeed;
        cat.vy = (cat.vy / speed) * maxSpeed;
        speed = maxSpeed;
      }
    } else {
      // IN AIR - gravity, light drag, no swim accel (touch ignored)
      cat.vy += 700 * dt; // gravity
      const airDrag = Math.pow(0.65, dt);
      cat.vx *= airDrag;
      // No vy drag - let gravity dominate
      speed = Math.hypot(cat.vx, cat.vy);
    }
    cat.x += cat.vx * dt;
    cat.y += cat.vy * dt;
    if (Math.abs(cat.vx) > 25) cat.facing = cat.vx > 0 ? 1 : -1;
    // Surface crossing detection - splash both ways
    const isUnderwaterNow = cat.y >= SURFACE_Y;
    if (wasUnderwater !== isUnderwaterNow) {
      const intensity = Math.min(1.5, Math.abs(cat.vy) / 250 + 0.3);
      spawnSplash(cat.x, SURFACE_Y, intensity);
      splashSound(intensity);
    }
  }
  // Clamp to world (allow above-surface jumps; sub can go even higher)
  cat.x = Math.max(50, Math.min(WORLD_W - 50, cat.x));
  cat.y = Math.max(SURFACE_Y - 550, Math.min(SAND_TOP - 30, cat.y));
  // Smooth scale lerp
  cat.scale += (cat.targetScale - cat.scale) * Math.min(1, dt * 5);
  // Tick down hurt + invuln timers
  if (cat.invuln > 0) cat.invuln = Math.max(0, cat.invuln - dt);
  if (cat.hurtT > 0) cat.hurtT = Math.max(0, cat.hurtT - dt);
  // Animation
  cat.paddle += dt * (4 + speed * 0.018);
  cat.tail += dt * (2.5 + speed * 0.012);
  // Blink occasionally
  cat.blinkT -= dt;
  if (cat.blinkT < 0) {
    if (cat.blinking) {
      cat.blinking = false;
      cat.blinkT = 2 + Math.random() * 4;
    } else {
      cat.blinking = true;
      cat.blinkT = 0.12;
    }
  }
  // Helmet bubble trail (only underwater)
  bubbleTrailT -= dt;
  if (bubbleTrailT < 0 && speed > 50 && cat.y >= SURFACE_Y) {
    spawnHelmetBubble();
    bubbleTrailT = 0.18;
  }

  // --- Camera ---
  const camTargetX = cat.x - W / 2;
  const camTargetY = cat.y - H / 2;
  const camLerp = Math.min(1, dt * 4);
  camera.x += (camTargetX - camera.x) * camLerp;
  camera.y += (camTargetY - camera.y) * camLerp;
  camera.x = Math.max(0, Math.min(WORLD_W - W, camera.x));
  // Allow camera to follow cat/sub above the world top into the sky
  camera.y = Math.max(-550, Math.min(WORLD_H - H, camera.y));

  // --- Update sea life ---
  for (const f of fish) {
    f.x += f.dir * f.speed * dt;
    f.wiggle += dt * 8;
    applyBoost(f, dt);
    if (f.x < 50) { f.x = 50; f.dir = 1; }
    if (f.x > WORLD_W - 50) { f.x = WORLD_W - 50; f.dir = -1; }
  }
  for (const f of bigfish) {
    f.x += f.dir * f.speed * dt;
    f.wiggle += dt * 4;
    applyBoost(f, dt);
    if (f.x < 100) { f.x = 100; f.dir = 1; }
    if (f.x > WORLD_W - 100) { f.x = WORLD_W - 100; f.dir = -1; }
  }
  for (const j of jellies) {
    j.y -= j.riseSpeed * dt;
    applyBoost(j, dt);
    if (j.y < SURFACE_Y - 50) j.y = SAND_TOP - 50;
  }
  // Seahorses drift gently around their home spot
  for (const sh of seahorses) {
    applyBoost(sh, dt);
    const tNow = Date.now() * 0.001;
    sh.x = sh.homeX + Math.sin(tNow * 0.4 + sh.driftSeed) * 25;
    sh.y = sh.homeY + Math.cos(tNow * 0.5 + sh.bobSeed) * 30;
  }
  // Sharks
  for (const sh of sharks) {
    if (sh.state === 'gone') continue;
    sh.wiggle += dt * 5;
    if (sh.wobbleT > 0) sh.wobbleT = Math.max(0, sh.wobbleT - dt);
    // Decay boop count if no recent boop
    const tNow2 = performance.now() / 1000;
    if (sh.boopCount > 0 && tNow2 - sh.boopT > 3) sh.boopCount = 0;
    if (sh.state === 'flee') {
      sh.fleeT += dt;
      sh.x += sh.dir * sh.speed * dt;
      // Slow down after the initial dash so they don't fly forever
      if (sh.fleeT > 3) {
        sh.speed = Math.max(sh.baseSpeed * 0.5, sh.speed - dt * 60);
      }
      // Stay inside the world - if they hit an edge, they chill there
      if (sh.x < 100) { sh.x = 100; sh.speed = Math.max(0, sh.speed - dt * 200); }
      if (sh.x > WORLD_W - 100) { sh.x = WORLD_W - 100; sh.speed = Math.max(0, sh.speed - dt * 200); }
      continue;
    }
    // Roaming
    sh.x += sh.dir * sh.speed * dt;
    if (sh.x < 100) { sh.x = 100; sh.dir = 1; }
    if (sh.x > WORLD_W - 100) { sh.x = WORLD_W - 100; sh.dir = -1; }
  }
  // Shark-vs-cat collision (gentle hurt with invincibility)
  // Skipped: when cat is bigger than shark (eating wins), in air, in toilet, or in sub
  if (cat.invuln <= 0 && cat.toiletState === 'free' && cat.subState === 'free' && cat.y >= SURFACE_Y) {
    const catR = getCatRadius();
    for (const sh of sharks) {
      if (sh.state !== 'roam') continue;
      if (catR > sh.size) continue; // too small to hurt - cat will eat instead
      const dx = cat.x - sh.x, dy = cat.y - sh.y;
      const r = sh.size * 0.85 + catR * 0.7; // shark hitbox + cat radius
      if (dx * dx + dy * dy < r * r) {
        const dist = Math.max(1, Math.hypot(dx, dy));
        const knock = 380;
        cat.vx = (dx / dist) * knock;
        cat.vy = (dy / dist) * knock - 60;
        cat.invuln = 1.5;
        cat.hurtT = 0.7;
        spawnSparks(cat.x, cat.y - 10);
        hurtSound();
        break;
      }
    }
  }

  // --- Cat eats anything smaller than itself (only underwater, never in sub) ---
  if (cat.toiletState === 'free' && cat.subState === 'free' && cat.y >= SURFACE_Y) {
    const catR = getCatRadius();
    // Eat one small fish per frame (lots of small fish = otherwise mass-spam)
    for (let i = fish.length - 1; i >= 0; i--) {
      const f = fish[i];
      if (catR <= f.size) continue;
      const dx = f.x - cat.x, dy = f.y - cat.y;
      const rr = catR * 0.7 + f.size * 0.5;
      if (dx * dx + dy * dy < rr * rr) {
        fish.splice(i, 1);
        fish.push(makeFish()); // respawn off-screen
        onEat(0.06);
        break;
      }
    }
    // Eat one seahorse
    for (let i = seahorses.length - 1; i >= 0; i--) {
      const s = seahorses[i];
      if (catR <= s.size) continue;
      const dx = s.x - cat.x, dy = s.y - cat.y;
      const rr = catR * 0.7 + s.size * 0.5;
      if (dx * dx + dy * dy < rr * rr) {
        seahorses.splice(i, 1);
        onEat(0.09);
        break;
      }
    }
    // Eat one jelly
    for (let i = jellies.length - 1; i >= 0; i--) {
      const j = jellies[i];
      if (catR <= j.size) continue;
      const dx = j.x - cat.x, dy = j.y - cat.y;
      const rr = catR * 0.7 + j.size * 0.5;
      if (dx * dx + dy * dy < rr * rr) {
        jellies.splice(i, 1);
        onEat(0.14);
        break;
      }
    }
    // Eat one bigfish
    for (let i = bigfish.length - 1; i >= 0; i--) {
      const f = bigfish[i];
      if (catR <= f.size) continue;
      const dx = f.x - cat.x, dy = f.y - cat.y;
      const rr = catR * 0.7 + f.size * 0.5;
      if (dx * dx + dy * dy < rr * rr) {
        bigfish.splice(i, 1);
        bigfish.push(makeBigFish());
        onEat(0.24);
        break;
      }
    }
    // Eat one shark (only when cat is big enough)
    for (let i = sharks.length - 1; i >= 0; i--) {
      const sh = sharks[i];
      if (sh.state === 'gone') continue;
      if (catR <= sh.size) continue;
      const dx = sh.x - cat.x, dy = sh.y - cat.y;
      const rr = catR * 0.7 + sh.size * 0.5;
      if (dx * dx + dy * dy < rr * rr) {
        sharks.splice(i, 1);
        onEat(0.4);
        break;
      }
    }
  }

  // Update splash droplets (gravity)
  for (let i = splashes.length - 1; i >= 0; i--) {
    const s = splashes[i];
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vy += 900 * dt;
    s.life -= dt;
    if (s.life <= 0 || s.y > SURFACE_Y + 80) splashes.splice(i, 1);
  }
  // Update fart particles
  for (let i = farts.length - 1; i >= 0; i--) {
    const f = farts[i];
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.vx *= 0.94;
    f.vy *= 0.94;
    f.size += dt * 8;
    f.life -= dt;
    if (f.life <= 0) farts.splice(i, 1);
  }
  // Tick down speech timer
  if (speechT > 0) speechT -= dt;
  // Update sparks
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vx *= 0.96;
    s.vy *= 0.96;
    s.vy += 30 * dt;
    s.rot += s.vrot * dt;
    s.life -= dt;
    if (s.life <= 0) sparks.splice(i, 1);
  }
  for (const b of bubbles) {
    b.y -= b.speed * dt;
    if (b.y < 0) { b.y = WORLD_H; b.x = (b.x + 137.3) % WORLD_W; }
  }
  for (let i = helmetBubbles.length - 1; i >= 0; i--) {
    const b = helmetBubbles[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt * 0.6;
    if (b.life <= 0) helmetBubbles.splice(i, 1);
  }
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    c.x += c.vx * dt;
    c.y += c.vy * dt;
    c.vy += 60 * dt; // gravity (water drag handled by reducing)
    c.vx *= 0.99;
    c.vy *= 0.99;
    c.rot += c.vrot * dt;
    c.life -= dt;
    if (c.life <= 0) confetti.splice(i, 1);
  }

  // --- Ambient bubble sfx ---
  if (t > nextBubbleAt) {
    bubbleSound();
    nextBubbleAt = t + 3000 + Math.random() * 5000;
  }

  // ===== Render =====
  drawBackground();
  drawBubbles();
  drawSand();
  // Sand decor
  for (const s of shells) drawShell(s);
  for (const s of starfishes) drawStarfish(s);
  // Stationary world objects
  for (const r of rocks) drawRock(r);
  for (const k of kelps) drawKelp(k);
  for (const c of corals) drawCoral(c);
  // Sea life
  for (const j of jellies) drawJelly(j);
  for (const sh of seahorses) drawSeahorse(sh);
  for (const f of bigfish) drawBigFish(f);
  for (const f of fish) drawFish(f);
  // Sharks (above smaller fish so they read as the "big" creature)
  for (const sh of sharks) drawShark(sh);
  // Toilets (drawn behind cat so cat sits ON them)
  for (const tl of toilets) drawToilet(tl);
  // Submarines (in front of fish so they read as vehicles)
  for (const s of subs) drawSub(s);
  // Helmet bubble trail
  drawHelmetBubbles();
  // Fart cloud (behind cat so cat is in front of own toot)
  drawFarts();
  // Cat
  drawCat();
  // Speech bubble above cat
  drawSpeech();
  // Sparks/stars over cat
  drawSparks();
  // Splash droplets (over cat so they appear on her too)
  drawSplashes();
  // Confetti
  drawConfetti();
  // HUD on top
  drawHUD();
  drawColorPicker();
  drawSubExitButton();
  } catch (err) {
    showError(err);
  }
  // Always draw the error overlay last (even on the next clean frame)
  try { drawErrorOverlay(); } catch (e) { /* swallow */ }
  requestAnimationFrame(loop);
}
</script>
</body>
